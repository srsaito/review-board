# Example LiteLLM proxy config for review-board.
# The proxy config is user-level (shared across projects). Install with:
#   mkdir -p ~/.config/litellm
#   cp config/litellm-example.yaml ~/.config/litellm/config.yaml
# Then start the proxy:
#   litellm --config ~/.config/litellm/config.yaml
#
# Pass --api-base http://127.0.0.1:4000 to review-board.

model_list:
  - model_name: review_chatgpt
    litellm_params:
      model: openai/gpt-5.4

  - model_name: review_gemini
    litellm_params:
      model: gemini/gemini-3.1-pro-preview
      api_key: os.environ/GEMINI_API_KEY
      api_base: https://generativelanguage.googleapis.com/v1beta
      response_mime_type: text/plain

litellm_settings:
  success_callback: ["sqlite"]
